apis:
  - aid: black-knight:msp-dx
    name: MSP DX (Direct Exchange) APIs
    description: >-
      MSP (Mortgage Servicing Platform) was Black Knight's flagship product — the
      mainframe-rooted system of record that services the majority of US first-mortgage
      loans. MSP DX (Direct Exchange) is the REST API surface around MSP, covering
      loan boarding, customer service, escrow, payments, payoffs, default management,
      loss mitigation, investor reporting, and stop-advance / ownership-transfer
      activities. Now hosted at developer.ice.com under "Mortgage Servicing" with
      subcategories including Collections, Customer Service, Invoicing, Loss
      Mitigation, MSP DX, Payoffs, Servicing Digital, Servicing Vault, and SIAM.
    humanURL: https://developer.ice.com/mortgage-servicing/catalog
    tags:
      - Loan Servicing
      - MSP
      - Default Management
      - Investor Reporting
      - Escrow
      - Payments
    properties:
      - type: DeveloperPortal
        url: https://developer.ice.com/mortgage-servicing/catalog
      - type: Documentation
        url: https://developer.ice.com/mortgage-servicing
      - type: Authentication
        url: https://developer.ice.com
        title: OAuth 2.0 (ICE federated identity)
      - type: JSONSchema
        url: json-schema/msp-loan-schema.json
      - type: JSONSchema
        url: json-schema/msp-escrow-schema.json
      - type: JSONSchema
        url: json-schema/msp-payment-schema.json
      - type: JSONStructure
        url: json-structure/msp-loan-structure.json
      - type: Example
        url: examples/msp-loan-example.json
      - type: Example
        url: examples/msp-payment-example.json
  - aid: black-knight:servicing-digital
    name: Servicing Digital / Promise To Pay APIs
    description: >-
      Borrower-facing servicing capabilities including the Promise To Pay API, which
      enables clients to document borrower payment promises along with reason codes,
      supporting collection workflows. Originally a Black Knight Servicing Digital
      product, now in the ICE Mortgage Servicing catalog.
    humanURL: https://developer.ice.com/mortgage-servicing/catalog
    tags:
      - Loan Servicing
      - Collections
      - Borrower Engagement
    properties:
      - type: Documentation
        url: https://developer.ice.com/mortgage-servicing/catalog
      - type: JSONSchema
        url: json-schema/servicing-promise-to-pay-schema.json
      - type: Example
        url: examples/servicing-promise-to-pay-example.json
  - aid: black-knight:loansphere
    name: LoanSphere Default, Document & Decisioning Suite
    description: >-
      LoanSphere was Black Knight's umbrella brand for default management
      (foreclosure, bankruptcy, loss-mitigation case management), document services
      (eClosing, eVault, eRecording via Simplifile/DocVerify which Black Knight
      acquired in 2019), and decisioning analytics. Most LoanSphere capabilities
      have been folded into ICE Mortgage Technology's servicing and origination
      catalogs; legacy LoanSphere endpoints were never broadly exposed as a public
      developer API, integrations have always been partner-gated.
    humanURL: https://mortgagetech.ice.com
    tags:
      - Default Management
      - Document Services
      - eClosing
      - eVault
      - Decisioning
    properties:
      - type: Documentation
        url: https://mortgagetech.ice.com
      - type: Status
        url: https://mortgagetech.ice.com
        title: Folded into ICE Mortgage Technology — no public dev portal
  - aid: black-knight:empower-los
    name: Empower LOS APIs
    description: >-
      Empower was Black Knight's mid-to-enterprise loan origination system. After
      the ICE acquisition, Empower coexists with ICE's larger Encompass LOS (from
      the 2020 Ellie Mae acquisition). Empower API access has historically been
      partner-gated and is not publicly documented; new integrations are steered
      toward Encompass Developer Connect.
    humanURL: https://mortgagetech.ice.com
    tags:
      - Loan Origination
      - LOS
      - Empower
    properties:
      - type: Documentation
        url: https://mortgagetech.ice.com
      - type: Status
        url: https://mortgagetech.ice.com
        title: Coexists with Encompass — partner-gated, no public API portal
  - aid: black-knight:encompass-developer-connect
    name: Encompass Developer Connect (sibling product under ICE)
    description: >-
      Although Encompass came to ICE via the 2020 Ellie Mae acquisition (not Black
      Knight), it is now the canonical LOS API surface under ICE Mortgage Technology
      and effectively supersedes the Empower public-API roadmap. Encompass Developer
      Connect exposes ~16 resource categories — Loans, Pipeline, Contacts, eFolder,
      Encompass Docs, Loan Verifications, Loan Tracking, Secondary Marketing,
      Services, Settings, Webhooks, Workflow, Custom Data Objects, Document Delivery,
      Loan Funding, Calculators — over OAuth 2.0 at api.elliemae.com.
    humanURL: https://developer.icemortgagetechnology.com/developer-connect
    baseURL: https://api.elliemae.com
    tags:
      - Loan Origination
      - LOS
      - Encompass
      - Webhooks
    properties:
      - type: DeveloperPortal
        url: https://developer.icemortgagetechnology.com/developer-connect
      - type: APIReference
        url: https://developer.icemortgagetechnology.com/developer-connect/reference
      - type: Postman
        url: https://help.icemortgagetechnology.com/documentation/developer-connect/postman/Encompass_Developer_Connect_postman_collection.json
      - type: Authentication
        url: https://developer.icemortgagetechnology.com/developer-connect
        title: OAuth 2.0 (API Key + Access Token, ISV Partner, SAML SSO, MFA)
      - type: ChangeLog
        url: https://developer.icemortgagetechnology.com/developer-connect/changelog/254-major-release
  - aid: black-knight:optimal-blue-ppe
    name: Optimal Blue Product & Pricing APIs (divested to Constellation)
    description: >-
      Optimal Blue's Product & Pricing Engine (PPE) generates eligible products and
      pricing for any user in any format and automates loan creation, locking,
      post-lock management, and secondary / lock-desk workflows. Originally
      acquired by Black Knight in 2020, Optimal Blue was divested to Constellation
      Software's Perseus Operating Group in September 2023 as a condition of FTC
      clearance for the ICE / Black Knight deal. APIs now live at
      digitalmarketplace.optimalblue.com under OAuth 2.0, with claimed search-request
      averages under 1 second across "millions of calls daily."
    humanURL: https://digitalmarketplace.optimalblue.com
    tags:
      - Secondary Marketing
      - Product Pricing Engine
      - Rate Lock
      - Optimal Blue
      - Divested
    properties:
      - type: DeveloperPortal
        url: https://digitalmarketplace.optimalblue.com
      - type: Documentation
        url: https://www2.optimalblue.com/api
      - type: Authentication
        url: https://www2.optimalblue.com/api
        title: OAuth 2.0 with token-based access
      - type: JSONSchema
        url: json-schema/optimal-blue-pricing-schema.json
      - type: JSONSchema
        url: json-schema/optimal-blue-lock-schema.json
      - type: Example
        url: examples/optimal-blue-pricing-example.json
      - type: Example
        url: examples/optimal-blue-lock-example.json
  - aid: black-knight:optimal-blue-trading
    name: Optimal Blue Loan Trading APIs (Resitrader)
    description: >-
      Workflow and data APIs for the Resitrader loan-trading application — execute
      trades, manage data modules, centralize trading operations. Now operated by
      Optimal Blue under Constellation Software ownership.
    humanURL: https://digitalmarketplace.optimalblue.com
    tags:
