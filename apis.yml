name: Black Knight (Acquired by ICE — Now ICE Mortgage Technology)
description: >-
  Black Knight, Inc. was a Jacksonville-based mortgage technology and data provider whose
  core franchises were MSP (the dominant US loan-servicing platform), LoanSphere
  (default, document, and decisioning suites), Empower LOS (mid-market loan origination),
  and the Optimal Blue secondary marketing / product-and-pricing engine. Intercontinental
  Exchange (NYSE: ICE) acquired Black Knight in September 2023 for approximately $11.7B
  (down from the originally-announced $13.1B in May 2022) after divesting Optimal Blue
  to Constellation Software's Perseus Operating Group as a condition of FTC clearance.
  Black Knight's product lines now sit inside ICE Mortgage Technology alongside Encompass
  (the ex-Ellie Mae LOS). The blackknightinc.com domain redirects to mortgagetech.ice.com,
  and developer surfaces have migrated to developer.ice.com (MSP DX APIs, Servicing Vault,
  Loss Mitigation, Payoffs, Promise To Pay) and developer.icemortgagetechnology.com
  (Encompass Developer Connect). Optimal Blue's APIs are now hosted at
  digitalmarketplace.optimalblue.com under independent Constellation Software ownership.
  This profile documents the API surfaces as they existed under Black Knight and tracks
  the post-acquisition fate of each product line.
tags:
