    name: Optimal Blue Business Intelligence APIs
    description: >-
      Data tools including 16 Mortgage Market Rate Indices, integrable into
      dashboards. Successor to Black Knight's Originations Market Monitor and
      Mortgage Monitor data products at the API level.
    humanURL: https://digitalmarketplace.optimalblue.com
    tags:
      - Business Intelligence
      - Market Data
      - Rate Indices
    properties:
      - type: DeveloperPortal
        url: https://digitalmarketplace.optimalblue.com
  - aid: black-knight:optimal-blue-broker-pricing
    name: Optimal Blue Broker Pricing APIs (Loansifter)
    description: >-
      Loansifter is the turnkey PPE for mortgage brokers — generate and display
      eligible products and pricing across borrower scenarios. Originally a Black
      Knight (via Optimal Blue) product, now under Constellation Software.
    humanURL: https://digitalmarketplace.optimalblue.com
    tags:
      - Broker Pricing
      - Loansifter
      - Product Pricing Engine
    properties:
      - type: DeveloperPortal
        url: https://digitalmarketplace.optimalblue.com
